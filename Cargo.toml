[package]
name = "rusty-alto-iced"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "A single-window Iced workbench for rusty-alto"
license = "Apache-2.0"

[dependencies]
iced = { version = "0.13.1", features = ["canvas", "tokio"] }
packed-term-arena = "0.1.0"
rfd = "0.17.2"
rusty-alto = { path = "../../rusty-alto" }

# `cargo bundle` packages a "Rusty Alto.app" whose CFBundleName drives the
# macOS menu-bar application name. See the macOS notes in the source.
[package.metadata.bundle]
name = "Rusty Alto"
identifier = "org.rustyalto.workbench"
short_description = "A single-window Iced workbench for rusty-alto"
category = "public.app-category.developer-tools"

