name: Release packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            formats: app,dmg
            platform: macos
          - os: windows-latest
            formats: wix
            platform: windows
          - os: ubuntu-latest
            formats: deb,appimage
            platform: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          path: rusty-alto-gui
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev libfuse2
      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked
      - name: Package
        working-directory: rusty-alto-gui
        run: cargo packager --release --formats ${{ matrix.formats }}
        # Signing/notarization environment variables can be added here once
        # platform credentials are provisioned.
      - name: Archive standalone binary
        if: runner.os != 'Windows'
        working-directory: rusty-alto-gui
        shell: bash
        run: |
          tar -C target/release -czf \
            "dist/rusty-alto-gui-${{ github.event.release.tag_name }}-${{ matrix.platform }}.tar.gz" \
            rusty-alto-gui
      - name: Archive standalone binary
        if: runner.os == 'Windows'
        working-directory: rusty-alto-gui
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/release/rusty-alto-gui.exe `
            -DestinationPath "dist/rusty-alto-gui-${{ github.event.release.tag_name }}-${{ matrix.platform }}.zip"
      - name: Smoke-check artifacts
        working-directory: rusty-alto-gui
        shell: bash
        run: test -n "$(find dist -type f -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: rusty-alto-gui-${{ matrix.platform }}
          path: |
            rusty-alto-gui/dist/*.dmg
            rusty-alto-gui/dist/*.msi
            rusty-alto-gui/dist/*.deb
            rusty-alto-gui/dist/*.AppImage
            rusty-alto-gui/dist/*.tar.gz
            rusty-alto-gui/dist/*.zip
          if-no-files-found: error

  attach-assets:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
