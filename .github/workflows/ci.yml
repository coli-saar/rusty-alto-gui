name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: rusty-alto-gui
      - uses: actions/checkout@v4
        with:
          repository: coli-saar/rusty-alto
          ref: 9c3f1a230a2cc9f7329f5da439c17912f977dcb3
          path: rusty-alto
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev
      - name: Check formatting
        working-directory: rusty-alto-gui
        run: cargo fmt --check
      - name: Test
        working-directory: rusty-alto-gui
        run: cargo test
      - name: Clippy
        working-directory: rusty-alto-gui
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Release build
        working-directory: rusty-alto-gui
        run: cargo build --release
      - name: Reject future-incompatible block dependency
        working-directory: rusty-alto-gui
        shell: bash
        run: |
          if cargo tree -i block >/dev/null 2>&1; then
            echo "future-incompatible block dependency is present"
            exit 1
          fi
